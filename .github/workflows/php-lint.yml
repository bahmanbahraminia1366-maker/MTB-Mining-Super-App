name: PHP lint

on:
  push:
    paths:
      - 'downloads/*.php'
      - '.github/workflows/php-lint.yml'
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Lint PHP installers
        run: |
          find downloads -maxdepth 1 -type f -name '*.php' -print0 | xargs -0 -n1 php -l
